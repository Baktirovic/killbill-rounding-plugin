# Kill Bill Rounding Plugin Configuration
# Push via: POST /1.0/kb/tenants/uploadPluginConfig/killbill-rounding-plugin

org.killbill.billing.plugin.rounding.enabled=true
org.killbill.billing.plugin.rounding.description=Rounding adjustment

# Comma-separated CURRENCY=increment pairs for cash rounding.
# Only currencies listed here will have a rounding item added to their invoices.
# Examples: SEK=1 (nearest 1.00), EUR=0.05 (nearest 0.05), NOK=1, ISK=1
org.killbill.billing.plugin.rounding.increments=SEK=1,EUR=0.05,NOK=1,ISK=1,DKK=0.5
